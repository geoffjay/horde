env: "testing"

mode: "slave"

server:
  port: 13500
  leader: "master:13420"

cluster:
  node_id: "test-node"
  discovery_mechanism: "static"

log:
  formatter: "json"
  level: "debug"

service:
  id: "org.horde.Test"

project:
  workspace_dir: "/tmp/test-workspace"
  context_retention: 120

agents:
  claude:
    kind: "aap"
    command: "claude-aap"
    args: ["--print"]
    env:
      - key: "CLAUDE_CODE_ENTRYPOINT"
        value: "horde"
    model: "claude-sonnet-5"
    system_prompt: "You are a careful coder."
    system_prompt_mode: "replace"
    auto_approve: true
    permissions:
      mode: "read_write"
      writable_paths: ["src/", "docs/"]
      deny_paths: [".git/", ".env"]

paths:
  config_dir: "/tmp/horde-config"
  data_dir: "/tmp/horde-data"
  state_dir: "/tmp/horde-state"
