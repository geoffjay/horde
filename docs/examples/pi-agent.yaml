# Example horde config: driving the pi coding agent through an AAP adapter.
#
# This declares a single external agent, `pi`, backed by the pi-aap adapter
# (https://github.com/geoffjay/pi-aap or your local checkout). The node spawns
# the adapter as a subprocess over the AAP stdio binding and drives it through
# the same invoke API and execution-context surfaces as a native ADK agent.
#
# Prerequisites:
#   1. Build the adapter:  cd pi-aap && npm run build
#   2. Ensure `node` is on PATH.
#   3. Provide the pi provider credentials the adapter needs (e.g. an Anthropic
#      key). They flow through: the host passes its own environment plus any
#      `agents.pi.env` entries to the adapter subprocess.
#
# Run:  HORDE_CONFIG=docs/examples/pi-agent.yaml ANTHROPIC_API_KEY=... horde serve
#
# The adapter path below is illustrative — point `args` at your built
# packages/pi-adapter/dist/index.js.

agents:
  pi:
    kind: "aap"
    command: "node"
    args: ["/absolute/path/to/pi-aap/packages/pi-adapter/dist/index.js"]
    # Requested model, sent as initialize.model. Empty uses the adapter default.
    model: "claude-sonnet-5"
    # Optional extra environment merged over the node's environment. The host
    # always forces AAP_TRANSPORT=stdio regardless of what is set here. Keys are
    # case-sensitive (env var names). Prefer inheriting the provider key from
    # the node's own environment rather than hard-coding a secret here.
    env:
      - key: "PI_AAP_DEBUG"
        value: "0"
    # Advisory filesystem scope sent in initialize.permissions. A compliant
    # adapter self-enforces it; the node is additionally the sole approval
    # authority. Omit the block to let the adapter use its own default scope.
    permissions:
      mode: "read_write"
      writable_paths: ["src/", "docs/"]
      deny_paths: [".git/", ".env"]
    # Approval policy. With auto_approve false (recommended for a write-capable
    # agent) every approval_request stays pending until a human decides it —
    # in the TUI agent view (↑↓ to select, `a` allow, `d` deny) or via
    # POST /api/v1/agents/{id}/approvals/{requestID}. Set true to auto-allow
    # every request (unattended; only for a trusted/sandboxed workspace).
    auto_approve: false
    # MCP servers provisioned for the adapter (sent in initialize.tools). Keyed
    # by server name; the adapter exposes each tool as <server>_<tool>. Env uses
    # the same {key, value} list form as the adapter env (case-preserving).
    mcp_servers:
      mock:
        command: "node"
        args: ["/absolute/path/to/pi-aap/packages/pi-adapter/scripts/mock-mcp-server.mjs"]
        # env:
        #   - { key: "SOME_VAR", value: "x" }

# Resume: no config needed. The host records the adapter's resume_token (from
# turn_complete) under <state_dir>/aap-resume.json, keyed by agent name, and
# replays it in the next initialize so a respawned adapter (or a node restart)
# continues the prior conversation instead of starting cold.
