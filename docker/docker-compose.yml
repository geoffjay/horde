# Integration environment for horde: one master and two slaves.
#
# All three services use the same image built from the repo Dockerfile. Slaves
# connect to the master via `HORDE_SERVER_LEADER=master:13420` and run in
# slave mode; local agent functionality is not blocked while the leader
# connection is being established.
#
# Run:  docker compose -f docker/docker-compose.yml up --build
#       (or `task docker:up`)
#
# Ports are mapped to distinct host ports so all three nodes can be inspected
# simultaneously. The container-internal port is always 13420.

services:
  master:
    build:
      context: ..
      dockerfile: Dockerfile
    image: horde:dev
    container_name: horde-master
    command: ["serve", "--mode", "master"]
    environment:
      HORDE_MODE: "master"
      HORDE_ENV: "integration"
      HORDE_LOG_FORMATTER: "json"
      HORDE_LOG_LEVEL: "info"
      HORDE_CLUSTER_NODE_ID: "master"
    ports:
      - "13420:13420"
    networks:
      - horde

  slave1:
    image: horde:dev
    container_name: horde-slave-1
    command: ["serve", "--mode", "slave"]
    environment:
      HORDE_MODE: "slave"
      HORDE_ENV: "integration"
      HORDE_LOG_FORMATTER: "json"
      HORDE_LOG_LEVEL: "info"
      HORDE_SERVER_LEADER: "master:13420"
      HORDE_CLUSTER_NODE_ID: "slave-1"
    ports:
      - "13421:13420"
    depends_on:
      - master
    networks:
      - horde

  slave2:
    image: horde:dev
    container_name: horde-slave-2
    command: ["serve", "--mode", "slave"]
    environment:
      HORDE_MODE: "slave"
      HORDE_ENV: "integration"
      HORDE_LOG_FORMATTER: "json"
      HORDE_LOG_LEVEL: "info"
      HORDE_SERVER_LEADER: "master:13420"
      HORDE_CLUSTER_NODE_ID: "slave-2"
    ports:
      - "13422:13420"
    depends_on:
      - master
    networks:
      - horde

networks:
  horde:
    driver: bridge
