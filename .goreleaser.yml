# GoReleaser configuration for horde.
#
# Build, archive, checksum, publish a GitHub release, and push the Homebrew
# formula to geoffjay/homebrew-tap in one pass. Triggered by .github/workflows/
# release.yml on tag pushes (v*).
#
# Local snapshot (no release, no tap push):
#   task snapshot
#   # or: goreleaser release --snapshot --clean

version: 2

project_name: horde

before:
  hooks:
    - go mod tidy

builds:
  - id: horde
    main: .
    binary: horde
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/geoffjay/horde/cmd.version={{.Version}}

archives:
  - id: tarball
    ids: [horde]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_{{ .Arch }}
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  prerelease: auto
  name_template: "{{ .Tag }}"

brews:
  - name: horde
    ids: [tarball]
    directory: Formula
    homepage: "https://github.com/geoffjay/horde"
    description: "Distributed multi-agent system built on the Google V2 ADK"
    license: MIT
    skip_upload: auto
    commit_msg_template: "horde {{ .Tag }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    repository:
      owner: geoffjay
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    test: |
      assert_match "horde", shell_output("#{bin}/horde --version")
