version: "3"

vars:
  BINARY: horde
  BUILD_DIR: bin

tasks:
  default:
    desc: Tidy, format, vet, test, and build
    deps:
      - tidy
      - fmt
      - vet
      - test
      - build

  build:
    desc: Build the horde binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -o {{.BUILD_DIR}}/{{.BINARY}} .

  build-all:
    desc: Build horde for linux/darwin (amd64, arm64)
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY}}-linux-amd64  .
      - GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY}}-linux-arm64  .
      - GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY}}-darwin-amd64 .
      - GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o {{.BUILD_DIR}}/{{.BINARY}}-darwin-arm64 .

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -s -w .
      - goimports -w . 2>/dev/null || true

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run --timeout=5m

  test:
    desc: Run unit tests (fast, deterministic — no subprocess/cluster tests)
    cmds:
      - go test -race -count=1 ./...

  test:integration:
    desc: Run the exhaustive integration suite (subprocess + multi-node cluster)
    deps: [build]
    cmds:
      - go test -race -count=1 -tags=integration -timeout=300s ./...

  test:cover:
    desc: Run unit tests with coverage
    cmds:
      - go test -race -coverprofile=coverage.out ./...

  docker:build:
    desc: Build the horde Docker image
    cmds:
      - docker build -t horde:dev .

  docker:up:
    desc: Start the integration environment (master + 2 slaves)
    cmds:
      - docker compose -f docker/docker-compose.yml up --build -d

  docker:down:
    desc: Stop the integration environment
    cmds:
      - docker compose -f docker/docker-compose.yml down

  docker:logs:
    desc: Tail integration environment logs
    cmds:
      - docker compose -f docker/docker-compose.yml logs -f

  docker:config:
    desc: Validate the compose config
    cmds:
      - docker compose -f docker/docker-compose.yml config

  snapshot:
    desc: Build a local release snapshot (no publish, no tap push)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Build and publish a release (run after tagging v*)
    cmds:
      - goreleaser release --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} coverage.out dist

  skills:sync:
    desc: Update agent skills
    cmds:
      - npx skills update
