name: Build & Test

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      # Unit tests only — fast and deterministic. The exhaustive integration
      # suite (subprocess + multi-node cluster, //go:build integration) is run
      # manually via `task test:integration`; the docker job below exercises the
      # full cluster topology in CI.
      - name: Run unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/horde-${GOOS}-${GOARCH}" .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: horde-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/horde-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  docker:
    name: Docker integration
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: horde:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate compose config
        run: docker compose -f docker/docker-compose.yml config

      - name: Bring up the cluster
        run: docker compose -f docker/docker-compose.yml up -d --build

      - name: Wait for nodes
        run: |
          for i in $(seq 1 30); do
            if docker ps --format '{{.Names}}' | grep -q horde-master; then
              echo "master is up"
              break
            fi
            sleep 1
          done

      - name: Show logs
        if: always()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yml down
